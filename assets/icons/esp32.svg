<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .chip {
        fill: none;
        stroke: #FFFFFF;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .wifi {
        fill: none;
        stroke: #FFFFFF;
        stroke-width: 16;
        stroke-linecap: round;
      }
      .text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 56px;
        font-weight: bold;
        fill: #FFFFFF;
      }
      .num {
        fill: #FFFFFF;
      }
    </style>
  </defs>

  <!-- Chip -->
  <rect x="96" y="96" width="320" height="220" rx="24" class="chip"/>

  <!-- Pins -->
  <g class="chip">
    <line x1="136" y1="72" x2="136" y2="96"/>
    <line x1="176" y1="72" x2="176" y2="96"/>
    <line x1="216" y1="72" x2="216" y2="96"/>
    <line x1="256" y1="72" x2="256" y2="96"/>
    <line x1="296" y1="72" x2="296" y2="96"/>
    <line x1="336" y1="72" x2="336" y2="96"/>
    <line x1="376" y1="72" x2="376" y2="96"/>

    <line x1="136" y1="316" x2="136" y2="340"/>
    <line x1="176" y1="316" x2="176" y2="340"/>
    <line x1="216" y1="316" x2="216" y2="340"/>
    <line x1="256" y1="316" x2="256" y2="340"/>
    <line x1="296" y1="316" x2="296" y2="340"/>
    <line x1="336" y1="316" x2="336" y2="340"/>
    <line x1="376" y1="316" x2="376" y2="340"/>

    <line x1="72" y1="136" x2="96" y2="136"/>
    <line x1="72" y1="176" x2="96" y2="176"/>
    <line x1="72" y1="216" x2="96" y2="216"/>
    <line x1="72" y1="256" x2="96" y2="256"/>

    <line x1="416" y1="136" x2="440" y2="136"/>
    <line x1="416" y1="176" x2="440" y2="176"/>
    <line x1="416" y1="216" x2="440" y2="216"/>
    <line x1="416" y1="256" x2="440" y2="256"/>
  </g>

  <!-- WiFi -->
  <path d="M180 240 A80 80 0 0 1 332 240" class="wifi"/>
  <path d="M205 240 A55 55 0 0 1 307 240" class="wifi"/>
  <path d="M232 240 A28 28 0 0 1 280 240" class="wifi"/>
  <circle cx="256" cy="252" r="8" fill="#FFFFFF"/>

  <!-- Text -->
  <text x="256" y="430" text-anchor="middle" class="text">
    ESP<tspan class="num">32</tspan>
  </text>
</svg>